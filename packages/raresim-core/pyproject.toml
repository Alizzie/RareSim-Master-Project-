[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "raresim"
version = "0.1.0"
dependencies = ["networkx", "pydantic", "python-dotenv"]

[tool.hatch.build.targets.wheel]
packages = ["src/raresim"]

[tool.pyright]
venvPath = "."
venv = ".venv"
extraPaths = ["packages/raresim-core/src"]